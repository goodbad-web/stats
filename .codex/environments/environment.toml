version = 1
name = "MyStats"

[setup]
script = '''
#!/bin/zsh
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
export DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"

echo "== Environment =="
sw_vers
xcodebuild -version
git --version

echo "== Homebrew check =="
if ! command -v brew >/dev/null 2>&1; then
  echo "Homebrew not found. Please install Homebrew first."
  exit 1
fi

echo "== Optional tools =="
brew list swiftlint >/dev/null 2>&1 || brew install swiftlint
brew list xcbeautify >/dev/null 2>&1 || brew install xcbeautify

echo "== Resolve Swift Packages =="
if ls *.xcodeproj >/dev/null 2>&1; then
  PROJECT="$(ls -d *.xcodeproj | head -n 1)"
  xcodebuild -resolvePackageDependencies -project "$PROJECT"
fi

echo "Setup completed."
'''

[cleanup]
script = '''
#!/bin/zsh
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

rm -rf .cache
rm -rf tmp
rm -rf DerivedData
'''

[[actions]]
name = "実行する"
icon = "run"
command = '''
#!/bin/zsh
set -euo pipefail

cd "$CODEX_WORKTREE_PATH"

export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
